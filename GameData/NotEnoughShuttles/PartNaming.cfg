// NotEnoughShuttles — part naming + tags
//
// Prepends [SSS] to every upstream giuliodondi SSS part title so they:
//   1. Sort together at the top of the parts list (square brackets sort first)
//   2. Are unambiguously distinguishable from ROEngines generics (RS-25, AJ10)
//   3. Don't collide with Benjee10 SOCK part titles in mixed installs
//
// Also adds a consistent `tags` set for search and fixes a couple of inconsistent
// upstream titles ("SSRB Nosecone" missing the Shuttle prefix, "Space Shuttle KU-band"
// using the unhyphenated form).

// ---------- Orbiter ----------
@PART[ShuttleOrbiter]:AFTER[RealismOverhaul]
{
    @title = [SSS] Shuttle Orbiter
    %tags = shuttle sts sss orbiter cabin fuselage wing
}

@PART[ShuttleOrbiterBasicCabin]:AFTER[RealismOverhaul]
{
    @title = [SSS] Shuttle Orbiter (Basic Cabin)
    %tags = shuttle sts sss orbiter cabin fuselage wing
}

