// NotEnoughShuttles — Harmony-driven NASA-table aero override
//
// For tagged shuttle orbiter parts, our Harmony postfix intercepts
// FARWingAerodynamicModel.CalculateCoefficients and substitutes Cl/Cd
// from NASA Operational Aerodynamic Data Book Vol.1 (Sept 1985) tables.
//
// We also strip the upstream FARSpaceShuttleAerodynamicModel module because
// the bundled FARShuttleAerodynamicModel.dll cannot load against the stock
// dkavolis FAR build that RP-1 ships — its overridden methods are private
// in dkavolis FAR. The Harmony patch (this plugin) replaces that approach
// without forking FAR.

@PART[ShuttleOrbiter*]:NEEDS[FerramAerospaceResearch]:AFTER[RealismOverhaul]
{
    // Strip the upstream custom aero module — its DLL can't bind against dkavolis FAR
    !MODULE[FARSpaceShuttleAerodynamicModel] {}

    // Tag the part so our Harmony postfix knows to override its FAR coefficients
    MODULE
    {
        name = ModuleNESAeroOverride
        minOverrideMach = 0.25
        maxOverrideMach = 30.0
        minOverrideAoARad = -0.17453292519943295    // -10 deg
        maxOverrideAoARad =  0.8726646259971648     // +50 deg
    }
}
