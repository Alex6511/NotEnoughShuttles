// NotEnoughShuttles — RP-1 tech tree wiring
//
// Adds TechRequired assignments for SSS parts that giuliodondi's rewrite
// either renamed or introduced after RP-1's TREE-Parts.cfg was last updated.
// Without this patch, RP-1's whitelist excludes them from the editor entirely.
//
// :NEEDS protects users without RP-1; :AFTER[xxxRP0] lands us after RP-1's own
// tree pass so we don't fight its own assignments where they exist.
//
// Tech node choices match existing RP-1 conventions:
//   ShuttleSSME       -> FRSC1981          (matches RP-1's existing @PART[SSME])
//   ShuttleEngineOMS  -> orbitalRocketry1981 (matches RP-1's @PART[ROE-AJ10-190])
//   Orbiter / gear    -> spaceShuttles
//   Ku-Band antennas  -> largeScaleComms   (matches @PART[benjee10_shuttle_kuBand])
//   Spacelab/Spacehab -> earlySpaceStations (matches @PART[rn_spacelab])
//   Cargo-bay airlocks-> largeScaleOrbitalCon (matches @PART[CXA_Quest_Airlock])
//   Transfer tunnels  -> spaceShuttles (shuttle-specific payload hardware)
//   EDO pallet        -> spaceShuttles (shuttle-only)


// ============================================================
// Orbiter, gear
// ============================================================

@PART[ShuttleOrbiter]:NEEDS[RP-1FullThrust|RP-1|RP-0]:AFTER[xxxRP0]
{
    %TechRequired = spaceShuttles
    @description ^= :$: <b><color=green>From NotEnoughShuttles</color></b>
}

